version: "3.8"

services:
  grafik-app:
    # Tell Docker Compose to build the image from the Dockerfile in the current directory '.'
    build: .

    # Set a custom container name for easy identification
    container_name: grafik_rcp_container

    # --- X11 GUI Forwarding Configuration ---
    # This section is critical for making the GUI work.

    # Share the host's display environment variable with the container
    environment:
      - DISPLAY=$DISPLAY

    # Mount the X11 socket from the host into the container.
    # This allows the container to communicate with your display server.
    # The ':ro' makes it read-only for better security.
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro

    # Optional: If you need to access files from your host machine inside the app,
    # you can mount a shared directory.
    # volumes:
    #   - /tmp/.X11-unix:/tmp/.X11-unix:ro
    #   - ./shared_data:/app/data # Maps a local 'shared_data' folder to '/app/data' inside the container
