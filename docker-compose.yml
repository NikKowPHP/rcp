services:
  grafik-app:
    ipc: host
    build:
      context: .
      args:
        - PROXY_URL=http://172.16.2.254:3128
    container_name: grafik_rcp_container

    # --- Proxy and GUI Environment Variables ---
    environment:
      - http_proxy=http://172.16.2.254:3128
      - https_proxy=http://172.16.2.254:3128
      - no_proxy=localhost,127.0.0.1
      # Dynamically pass host variables
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
      - QT_X11_NO_MITSHM=1

    # --- Volumes for Persistence and Display Sockets ---
    volumes:
      - ./files:/app/files
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      # Map the exact Wayland socket path from your host
      - ${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}:${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}:ro

    # CRITICAL: Match your host user exactly. 
    # If using Fish, ensure you run: set -x UID (id -u); set -x GID (id -g) before up
    user: "${UID:-1000}:${GID:-1000}"